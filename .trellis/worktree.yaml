# Worktree Configuration for Trellis Documentation Project
# Used for worktree initialization in multi-agent workflows
#
# All paths are relative to project root

#-------------------------------------------------------------------------------
# Paths
#-------------------------------------------------------------------------------

# Worktree storage directory (relative to project root)
worktree_dir: ../trellis-docs-worktrees

#-------------------------------------------------------------------------------
# Files to Copy
#-------------------------------------------------------------------------------

# Files to copy to each worktree (each worktree needs independent copy)
copy:
  # Workflow config
  - .trellis/.developer

#-------------------------------------------------------------------------------
# Post-Create Hooks
#-------------------------------------------------------------------------------

# Commands to run after creating worktree
# Executed in worktree directory, in order, abort on failure
post_create:
  # Install project dependencies
  - pnpm install --frozen-lockfile
  # Install Mintlify CLI for local preview (if not already installed)
  - pnpm install -g mintlify

#-------------------------------------------------------------------------------
# Check Agent Verification (Ralph Loop)
#-------------------------------------------------------------------------------

# Commands to verify documentation quality before allowing check agent to finish
# For Mintlify docs, we verify:
# 1. docs.json is valid JSON
# 2. All navigation pages exist
# 3. Frontmatter is valid in MDX files
verify:
  - python3 .trellis/scripts/verify-docs.py
